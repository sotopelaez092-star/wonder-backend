<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Wonder · 课程导航</title>
<!-- 关键图片预加载：浏览器和 HTML 并行下载，不等 DOM 解析 -->
<style>
  :root {
    --green: #58cc02;
    --green-edge: #2f9d00;
    --green-deep: #246000;
    --yellow: #ffc800;
    --red: #ff4b4b;
    --bg: #fffff4;
    --card: #ffffff;
    --text: #4b4b4b;
    --muted: #8e8e8e;
    --border: #e5e5e5;
    --border-strong: #cecece;
  }
  * { box-sizing: border-box; }
  body, html { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
                 "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    font-weight: 700;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 14px 18px 80px;
  }

  /* ============ Top bar ============ */
  .top {
    display: flex;
    gap: 10px;
    align-items: stretch;
    padding-top: env(safe-area-inset-top);
    margin-bottom: 16px;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
    background: var(--card);
    border: 2px solid var(--border);
    border-bottom: 5px solid var(--border-strong);
    border-radius: 14px;
    padding: 8px 12px;
    cursor: pointer;
    font: inherit;
    text-align: left;
    color: var(--text);
    transition: transform 80ms ease, border-bottom-width 80ms ease;
  }
  .pill:active { transform: translateY(3px); border-bottom-width: 2px; }
  .pill .icon {
    width: 38px; height: 38px;
    background: var(--green);
    color: #fff;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    flex: none;
    box-shadow: 0 3px 0 var(--green-edge), inset 0 2px 0 rgba(255,255,255,0.25);
  }
  .pill .meta { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .pill .meta .label { font-size: 11px; color: var(--muted); font-weight: 800; }
  .pill .meta .name { font-size: 14px; font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill .switch { font-size: 11px; color: var(--green-edge); font-weight: 900; }

  .top-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-bottom: 5px solid var(--border-strong);
    border-radius: 14px;
    padding: 6px 6px 4px;
    width: 58px;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    font: inherit;
    color: var(--text);
    transition: transform 80ms ease, border-bottom-width 80ms ease;
  }
  .icon-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
  .icon-btn img { width: 26px; height: 26px; }
  .icon-btn .lbl { font-size: 11px; font-weight: 900; }

  /* ============ Banner ============ */
  .banner {
    position: relative;
    background:
      radial-gradient(120% 140% at 30% 0%, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.18) 30%, rgba(255,255,255,0) 60%),
      linear-gradient(180deg, #6cd928 0%, #58cc02 50%, #4eb700 100%);
    color: #fff;
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 24px;
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.34),
      inset 0 -2px 0 rgba(0,76,0,0.18),
      0 6px 0 var(--green-edge),
      0 10px 18px rgba(46,142,0,0.18);
    text-shadow: 0 1px 0 rgba(0,82,0,0.22);
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
  }
  .banner .text { flex: 1; min-width: 0; }
  .banner .meta { font-size: 12px; opacity: 0.9; font-weight: 800; }
  .banner .title {
    font-size: 22px;
    font-weight: 900;
    margin-top: 2px;
    line-height: 1.2;
  }
  .banner .mascot {
    width: 74px; height: 74px;
    flex: none;
    object-fit: contain;
    filter: drop-shadow(0 4px 4px rgba(0,0,0,0.22));
    transform: translateY(2px);
  }

  /* ============ Tree ============ */
  .tree {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 10px 0 0;
  }
  .row {
    display: flex;
    justify-content: center;
    width: 100%;
    margin-bottom: 18px;
  }
  .row.shift-l { transform: translateX(-72px); }
  .row.shift-r { transform: translateX(72px); }

  /* lesson node */
  .node {
    position: relative;
    width: 124px; height: 104px;
    background: transparent;
    border: 0;
    padding: 0;
    cursor: pointer;
    font: inherit;
    color: inherit;
    transition: transform 80ms ease;
    text-align: center;
  }
  /* 3D base plate */
  .node::before {
    content: '';
    position: absolute;
    left: 18px; right: 18px; bottom: 28px;
    height: 24px;
    border-radius: 999px;
    background: var(--green-deep);
    box-shadow: 0 6px 0 #1a4a00;
    opacity: 0.92;
    transform: scaleX(0.92);
    transition: bottom 80ms ease, height 80ms ease, box-shadow 80ms ease;
    z-index: 0;
  }
  .node .art {
    position: relative;
    z-index: 1;
    width: 110px;
    height: 78px;
    object-fit: contain;
    display: block;
    margin: 0 auto;
    transform: translateY(-4px);
    filter: drop-shadow(0 6px 4px rgba(0,0,0,0.18));
    transition: transform 80ms ease, filter 80ms ease;
  }
  .node .label {
    position: relative;
    z-index: 2;
    font-size: 13px;
    font-weight: 900;
    color: var(--muted);
    margin-top: 6px;
  }
  .node.active .label { color: var(--green-edge); }
  .node.done .label { color: #d4a900; }

  .node:active::before {
    bottom: 24px;
    height: 18px;
    box-shadow: 0 2px 0 #1a4a00;
  }
  .node:active .art {
    transform: translateY(0);
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.12));
  }

  /* locked node — grey plate */
  .node.locked { cursor: default; }
  .node.locked::before {
    background: #aaa;
    box-shadow: 0 6px 0 #8a8a8a;
    opacity: 0.7;
  }
  .node.locked .art {
    filter: drop-shadow(0 4px 3px rgba(0,0,0,0.12));
    opacity: 0.96;
  }
  .node.locked:active::before { bottom: 28px; height: 24px; box-shadow: 0 6px 0 #8a8a8a; }
  .node.locked:active .art { transform: translateY(-4px); }

  /* done node (treasure) — yellow plate */
  .node.done::before {
    background: #d29800;
    box-shadow: 0 6px 0 #a17400;
  }

  /* active wrapper with breathing progress ring */
  .active-wrap {
    position: relative;
    width: 160px; height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .active-wrap .prog-ring {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    animation: ring-breathe 1.9s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes ring-breathe {
    0%, 100% { transform: scale(0.96); }
    50% { transform: scale(1.10); }
  }

  /* end flag */
  .end-flag {
    width: 110px;
    text-align: center;
    padding-top: 4px;
  }
  .end-flag img {
    width: 86px; height: 86px;
    filter: drop-shadow(0 6px 4px rgba(0,0,0,0.14));
  }
  .end-flag .label { color: var(--muted); font-weight: 900; font-size: 12px; margin-top: 4px; }

  /* empty pack */
  .empty {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 26px 22px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin: 12px 0 30px;
  }
  .empty h3 { color: var(--text); font-weight: 900; font-size: 16px; margin: 0 0 6px; }

  /* ============ Modal ============ */
  .modal[hidden] { display: none; }
  .modal {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }
  .modal-card {
    background: #fff;
    border-radius: 18px;
    padding: 22px 22px 18px;
    width: 100%;
    max-width: 420px;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
  }
  .modal-card h2 { font-size: 20px; font-weight: 900; color: var(--text); margin: 0 0 6px; }
  .modal-card p { color: var(--muted); font-size: 13px; line-height: 1.5; margin: 0 0 14px; }

  .form { display: flex; flex-direction: column; gap: 8px; }
  .field { display: block; }
  .field input {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font: inherit;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus { outline: none; border-color: var(--green); }
  .field.invalid input {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255, 75, 75, .15);
  }
  .field-err {
    display: block;
    padding: 4px 4px 0;
    color: var(--red);
    font-size: 12px;
    font-weight: 800;
    min-height: 0;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity .15s, transform .15s, min-height .15s;
  }
  .field.invalid .field-err { opacity: 1; transform: translateY(0); min-height: 16px; }

  .form-msg { font-size: 13px; font-weight: 800; min-height: 18px; margin-top: 6px; }
  .form-msg.err { color: var(--red); }
  .form-msg.ok { color: var(--green-edge); }

  .actions { display: flex; gap: 10px; margin-top: 14px; }
  .btn {
    border: 0;
    background: var(--green);
    color: #fff;
    font: inherit;
    font-weight: 900;
    font-size: 15px;
    padding: 12px 18px;
    border-radius: 14px;
    box-shadow: 0 4px 0 var(--green-edge);
    cursor: pointer;
    flex: 1;
    transition: transform 80ms ease, box-shadow 80ms ease;
  }
  .btn.ghost {
    background: transparent;
    color: var(--muted);
    box-shadow: none;
    border: 2px solid var(--border);
    border-bottom: 4px solid var(--border-strong);
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-edge); }
  .btn.ghost:active { border-bottom-width: 2px; }
  .btn[disabled] { opacity: .5; cursor: not-allowed; transform: none; }

  .pack-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 4px 0;
  }
  .pack-card {
    background: var(--bg);
    border: 2px solid var(--border);
    border-bottom: 4px solid var(--border-strong);
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    font: inherit;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: transform 80ms ease, border-bottom-width 80ms ease;
  }
  .pack-card:active { transform: translateY(3px); border-bottom-width: 2px; }
  .pack-card.current { border-color: var(--green); background: rgba(88, 204, 2, .08); }
  .pack-card .pc-title { font-weight: 900; font-size: 14px; }
  .pack-card .pc-unit { font-size: 11px; color: var(--muted); }
  .pack-card .pc-status { font-size: 11px; font-weight: 800; margin-top: 4px; }
  .pack-card.playable .pc-status { color: var(--green-edge); }
  .pack-card:not(.playable) .pc-status { color: var(--muted); }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 800;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 2000;
    max-width: 80vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<div class="modal" id="modal-pack" hidden>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-pack-title">
    <h2 id="modal-pack-title">选择课程包</h2>
    <p>试用阶段先开放部分课程包，其余课程包逐步导入。</p>
    <div class="pack-grid" data-pack-grid></div>
    <div class="actions">
      <button class="btn ghost" type="button" data-close>关闭</button>
    </div>
  </div>
</div>

<div class="modal" id="modal-register" hidden>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-register-title">
    <h2 id="modal-register-title">注册体验账号</h2>
    <p>填一个用户名和密码（仅保存在你的浏览器，不会上传到服务器）。</p>
    <form class="form" id="form-register" novalidate>
      <label class="field">
        <input name="username" type="text" autocomplete="username" placeholder="用户名 / 手机号">
        <span class="field-err" data-err="username"></span>
      </label>
      <label class="field">
        <input name="password" type="password" autocomplete="new-password" placeholder="密码（至少 4 位）">
        <span class="field-err" data-err="password"></span>
      </label>
      <div class="actions">
        <button class="btn ghost" type="button" data-close>稍后</button>
        <button class="btn" type="submit">注册解锁</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-waitlist" hidden>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-waitlist-title">
    <h2 id="modal-waitlist-title">加入内测名单</h2>
    <p>留个联系方式，新课程包上线我们第一时间联系你。</p>
    <form class="form" id="form-waitlist" novalidate>
      <label class="field">
        <input name="contact" type="text" autocomplete="email" placeholder="手机号 / 邮箱 / 微信号">
        <span class="field-err" data-err="contact"></span>
      </label>
      <label class="field">
        <input name="grade" type="text" placeholder="孩子年级（可选，如：三年级）">
      </label>
      <label class="field">
        <input name="interest" type="text" placeholder="最想试的课程（可选）">
      </label>
      <div class="form-msg" data-msg></div>
      <div class="actions">
        <button class="btn ghost" type="button" data-close>稍后</button>
        <button class="btn" type="submit" data-submit>提交申请</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" data-toast></div>

<script>
(() => {
  // Same-origin — backend serves /api/* on the same host
  const API_BASE = '';

  const STORAGE = {
    pack: 'wonder_pack',
    user: 'wonder_user',
    session: 'wonder_session',
  };

  let sessionId = '';
  try {
    sessionId = localStorage.getItem(STORAGE.session) || '';
    if (!sessionId) {
      sessionId = 's_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
      localStorage.setItem(STORAGE.session, sessionId);
    }
  } catch { sessionId = 's_' + Date.now().toString(36); }

  function track(type, properties) {
    const body = { type, session_id: sessionId, page: location.pathname + location.search, properties: properties || {} };
    try {
      fetch(API_BASE + '/api/events', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body), keepalive: true }).catch(() => {});
    } catch {}
  }

  let packs = [];
  let currentPack = null;
  let user = null;
  try { user = JSON.parse(localStorage.getItem(STORAGE.user) || 'null'); } catch {}

  const $tree = document.querySelector('[data-tree]');
  const $packName = document.querySelector('[data-pack-name]');
  const $packIcon = document.querySelector('[data-pack-icon]');
  const $bannerMeta = document.querySelector('[data-banner-meta]');
  const $bannerTitle = document.querySelector('[data-banner-title]');
  const $registerLabel = document.querySelector('[data-register-label]');

  async function loadCourses() {
    try {
      const res = await fetch('/courses.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error('http ' + res.status);
      const data = await res.json();
      packs = Array.isArray(data.packs) ? data.packs : [];
    } catch (err) {
      packs = [];
      showToast('课程数据加载失败');
      console.warn('[wonder] courses.json:', err);
    }
    const savedId = localStorage.getItem(STORAGE.pack);
    currentPack = packs.find(p => p.id === savedId) || packs[0] || null;
    render();
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function render() {
    if (!currentPack) {
      $packName.textContent = '暂无课程';
      $packIcon.textContent = '—';
      $bannerMeta.textContent = '';
      $bannerTitle.textContent = '请在 courses.json 添加课程';
      $tree.innerHTML = '<div class="empty"><h3>暂无课程数据</h3>编辑 <code>public/courses.json</code> 添加课程包</div>';
      $registerLabel.textContent = user ? '已注册' : '注册';
      return;
    }
    $packName.textContent = currentPack.title || currentPack.id;
    $packIcon.textContent = currentPack.icon || '·';
    $bannerMeta.textContent = currentPack.title || '';
    $bannerTitle.textContent = currentPack.unit || currentPack.title || '';
    $registerLabel.textContent = user ? '已注册' : '注册';

    const lessons = Array.isArray(currentPack.lessons) ? currentPack.lessons : [];
    if (!currentPack.playable || lessons.length === 0) {
      $tree.innerHTML = `
        <div class="empty">
          <h3>${esc(currentPack.title || '')}课程包待导入</h3>
          这个课程包还未上线。加入内测名单第一时间体验。
          <div class="actions" style="justify-content:center;">
            <button class="btn" type="button" data-open-waitlist data-waitlist-source="empty_pack:${esc(currentPack.id)}">加入内测</button>
          </div>
        </div>`;
      return;
    }

    const doneList = (user && user.lessonsDone && user.lessonsDone[currentPack.id]) || [];
    const rows = lessons.map((lesson, idx) => {
      const isDone = doneList.includes(lesson.id);
      const isUnlocked = idx === 0 || (user && idx <= doneList.length);

  function openModal(id) { document.getElementById(id).hidden = false; }
  function closeModal(id) { document.getElementById(id).hidden = true; }
  function closeAllModals() { document.querySelectorAll('.modal').forEach(m => { m.hidden = true; }); }

  const $toast = document.querySelector('[data-toast]');
  let toastTimer = null;
  function showToast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $toast.classList.remove('show'), 1800);
  }

  function renderPackGrid() {
    const $grid = document.querySelector('[data-pack-grid]');
    if (!packs.length) {
      $grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">还没有任何课程包，编辑 <code>public/courses.json</code> 添加。</div>';
      return;
    }
    $grid.innerHTML = packs.map(p => `
      <button class="pack-card ${p.playable ? 'playable' : ''} ${currentPack && p.id === currentPack.id ? 'current' : ''}"
              type="button" data-pick-pack="${esc(p.id)}">
        <div class="pc-title">${esc(p.title || p.id)}</div>
        <div class="pc-unit">${esc(p.unit || '')}</div>
        <div class="pc-status">${p.playable ? '当前可体验' : '待导入'}</div>
      </button>
    `).join('');
  }

  function clearFieldErrors(form) {
    form.querySelectorAll('.field.invalid').forEach(f => {
      f.classList.remove('invalid');
      const err = f.querySelector('.field-err');
      if (err) err.textContent = '';
    });
  }
  function setFieldErr(form, name, msg) {
    const input = form.elements[name];
    if (!input) return;
    const field = input.closest('.field');
    if (field) {
      field.classList.add('invalid');
      const err = field.querySelector('.field-err');
      if (err) err.textContent = msg;
    }
  }
  function bindLiveClear(form) {
    form.querySelectorAll('.field input').forEach(input => {
      input.addEventListener('input', () => {
        const field = input.closest('.field');
        if (field && field.classList.contains('invalid')) {
          field.classList.remove('invalid');
          const err = field.querySelector('.field-err');
          if (err) err.textContent = '';
        }
      });
    });
  }

  const formRegister = document.getElementById('form-register');
  const formWaitlist = document.getElementById('form-waitlist');
  bindLiveClear(formRegister);
  bindLiveClear(formWaitlist);

  formRegister.addEventListener('submit', (e) => {
    e.preventDefault();
    clearFieldErrors(formRegister);
    const u = formRegister.elements.username.value.trim();
    const p = formRegister.elements.password.value;
    let first = null;
    if (!u) { setFieldErr(formRegister, 'username', '请填写用户名或手机号'); first = first || formRegister.elements.username; }
    else if (u.length < 2) { setFieldErr(formRegister, 'username', '至少 2 个字符'); first = first || formRegister.elements.username; }
    if (!p) { setFieldErr(formRegister, 'password', '请设置密码'); first = first || formRegister.elements.password; }
    else if (p.length < 4) { setFieldErr(formRegister, 'password', '密码至少 4 位'); first = first || formRegister.elements.password; }
    if (first) { first.focus(); return; }
    user = { username: u, registered_at: new Date().toISOString(), lessonsDone: {} };
    try { localStorage.setItem(STORAGE.user, JSON.stringify(user)); } catch {}
    track('register_success', { username_len: u.length });
    closeModal('modal-register');
    showToast('注册成功');
    render();
    formRegister.reset();
  });

  formWaitlist.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearFieldErrors(formWaitlist);
    const $msg = formWaitlist.querySelector('[data-msg]');
    $msg.textContent = ''; $msg.className = 'form-msg';

    const contact = formWaitlist.elements.contact.value.trim();
    if (!contact) {
      setFieldErr(formWaitlist, 'contact', '请填写联系方式');
      formWaitlist.elements.contact.focus();
      return;
    }
    const looksValid = /^(1[3-9]\d{9}|[^\s@]+@[^\s@]+\.[^\s@]+|[\w.-]{4,})$/.test(contact);
    if (!looksValid) {
      setFieldErr(formWaitlist, 'contact', '请填有效的手机号 / 邮箱 / 微信号');
      formWaitlist.elements.contact.focus();
      return;
    }

    const submitBtn = formWaitlist.querySelector('[data-submit]');
    submitBtn.disabled = true;
    try {
      const res = await fetch(API_BASE + '/api/waitlist', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          contact,
          grade: formWaitlist.elements.grade.value.trim(),
          interest: formWaitlist.elements.interest.value.trim(),
          source: formWaitlist.dataset.source || '',
          pack: currentPack ? currentPack.id : '',
          session_id: sessionId,
          full_url: location.href,
          query: location.search,
        }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.ok === false) {
        $msg.textContent = json.error || '提交失败，请稍后再试';
        $msg.className = 'form-msg err';
        return;
      }
      $msg.textContent = '已收到，期待你试用！';
      $msg.className = 'form-msg ok';
      track('waitlist_success', { source: formWaitlist.dataset.source || '' });
      formWaitlist.reset();
      setTimeout(() => closeModal('modal-waitlist'), 1000);
    } catch (err) {
      $msg.textContent = '网络异常，请稍后再试';
      $msg.className = 'form-msg err';
    } finally {
      submitBtn.disabled = false;
    }
  });

  document.addEventListener('click', (e) => {
    if (e.target.closest('[data-close]')) { closeAllModals(); return; }

    if (e.target.closest('[data-open-pack]')) {
      renderPackGrid();
      openModal('modal-pack');
      track('open_pack_modal');
      return;
    }

    if (e.target.closest('[data-open-register]')) {
      clearFieldErrors(formRegister);
      formRegister.reset();
      openModal('modal-register');
      track('open_register_modal');
      setTimeout(() => formRegister.elements.username.focus(), 60);
      return;
    }

    const wl = e.target.closest('[data-open-waitlist]');
    if (wl) {
      clearFieldErrors(formWaitlist);
      const $msg = formWaitlist.querySelector('[data-msg]');
      $msg.textContent = ''; $msg.className = 'form-msg';
      formWaitlist.reset();
      formWaitlist.dataset.source = wl.dataset.waitlistSource || '';
      openModal('modal-waitlist');
      track('open_waitlist_modal', { source: formWaitlist.dataset.source });
      setTimeout(() => formWaitlist.elements.contact.focus(), 60);
      return;
    }

    const pp = e.target.closest('[data-pick-pack]');
    if (pp) {
      const id = pp.dataset.pickPack;
      const pack = packs.find(p => p.id === id);
      if (pack) {
        currentPack = pack;
        try { localStorage.setItem(STORAGE.pack, id); } catch {}
        track('pack_select', { pack: id });
        closeModal('modal-pack');
        render();
      }
      return;
    }

    const lb = e.target.closest('[data-lesson]');
    if (lb) {
      const id = lb.dataset.lesson;
      const lesson = currentPack && currentPack.lessons.find(l => l.id === id);
      const state = lb.classList.contains('locked') ? 'locked'
                  : lb.classList.contains('done') ? 'done' : 'active';
      track('lesson_tap', { pack: currentPack && currentPack.id, lesson: id, state, has_url: Boolean(lesson && lesson.play_url) });
      if (state === 'locked') {
        if (!user) {
          showToast('注册后解锁后续课程');
          setTimeout(() => document.querySelector('[data-open-register]').click(), 400);
        } else {
          showToast('完成前一课后解锁');
        }
        return;
      }
      if (lesson && lesson.play_url) {
        showToast('正在进入 ' + (lesson.title || ''));
        setTimeout(() => { window.location.href = lesson.play_url; }, 300);
        return;
      }
      showToast((lesson && lesson.title ? lesson.title + ' · ' : '') + '课程内容待导入');
      return;
    }

    const bg = e.target.classList && e.target.classList.contains('modal') ? e.target : null;
    if (bg) closeAllModals();
  });

  loadCourses();
  track('page_view');
})();
</script>
</body>
</html>
